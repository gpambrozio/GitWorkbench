<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Git Workbench — Prototype</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #ececef; }
  * { box-sizing: border-box; }
  #root { height: 100vh; }
  ::selection { background: rgba(124,92,224,0.24); }
  /* scrollbars — native macOS overlay feel */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.22); border-radius: 6px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.34); background-clip: padding-box; border: 3px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  .gt-press { cursor: pointer; transition: transform 0.08s ease, opacity 0.12s; -webkit-user-select: none; user-select: none; }
  .gt-press:active { transform: scale(0.94); opacity: 0.8; }
  .gt-rail:hover, .gt-menuitem:hover { background: rgba(0,0,0,0.05) !important; }
  .gt-commitrow:hover { background: rgba(0,0,0,0.04); }
  .gt-rail[style*="rgb(124, 92, 224)"]:hover { background: #7c5ce0 !important; }
  .gt-link:hover { text-decoration: underline; }
  .gt-spin { animation: gtspin 0.7s linear infinite; }
  @keyframes gtspin { to { transform: rotate(360deg); } }
  @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 8px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="gitdata.js"></script>
<script type="text/babel" src="base.jsx"></script>
<script type="text/babel" src="diff.jsx"></script>
<script type="text/babel" src="proto-views.jsx"></script>
<script type="text/babel" src="proto.jsx"></script>

<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<Workbench />);
</script>
</body>
</html>
